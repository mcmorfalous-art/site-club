<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Morfalous — Vote Circuits</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --night:#0a1622;
  --night2:#0f2032;
  --steel:#16344f;
  --bone:#eef4fa;
  --bone-dim:#8fa6bb;
  --cyan:#1ea7e1;
  --cyan-deep:#0d6fa8;
  --red:#e23b2e;
  --line:#1d3a49;
  --line2:#1d3a52;
  --flag:#f4f1ea;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--night);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(30,167,225,.12),transparent 50%),
    radial-gradient(ellipse at 90% 100%,rgba(226,59,46,.07),transparent 55%);
  color:var(--bone);
  font-family:'Barlow',sans-serif;
  min-height:100vh;
  padding:24px 16px 60px;
}
/* écran pseudo */
.pseudo-gate{
  position:fixed;inset:0;z-index:50;
  background:rgba(6,14,22,.92);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.pseudo-gate.hidden{display:none}
.pseudo-card{
  background:linear-gradient(180deg,var(--night2),var(--night));
  border:1px solid var(--line2);border-radius:18px;
  padding:30px 26px;max-width:380px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.pseudo-title{
  font-family:'Archivo Black',sans-serif;font-size:24px;
  text-transform:uppercase;letter-spacing:-.01em;margin-bottom:8px;
}
.pseudo-sub{color:var(--bone-dim);font-size:14px;margin-bottom:20px;line-height:1.5}
.pseudo-sub b{color:var(--cyan)}
.pseudo-input{
  width:100%;padding:13px 16px;border-radius:11px;
  background:var(--night);border:1.5px solid var(--line2);
  color:var(--bone);font-family:'Barlow',sans-serif;font-size:16px;
  text-align:center;margin-bottom:14px;
}
.pseudo-input:focus{outline:none;border-color:var(--cyan)}
.pseudo-btn{
  width:100%;padding:13px;border-radius:11px;border:none;cursor:pointer;
  background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));
  color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;font-size:16px;
}
.pseudo-btn:hover{filter:brightness(1.08)}
.pseudo-err{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
.wrap{max-width:760px;margin:0 auto}

/* header */
header{text-align:center;margin-bottom:28px;position:relative}
.club-logo{
  width:96px;height:96px;border-radius:50%;
  object-fit:cover;margin-bottom:14px;
  border:2px solid var(--steel);
  box-shadow:0 0 0 4px var(--night2),0 6px 24px rgba(0,0,0,.5);
}
.eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  letter-spacing:.32em;text-transform:uppercase;
  font-size:13px;font-weight:600;color:var(--cyan);
  margin-bottom:6px;
}
h1{
  font-family:'Archivo Black',sans-serif;
  font-size:clamp(34px,9vw,58px);
  line-height:.92;text-transform:uppercase;
  letter-spacing:-.02em;
  background:linear-gradient(180deg,var(--bone),#7fb4d6);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.round-badge{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:14px;padding:7px 16px;
  background:var(--night2);border:1px solid var(--line);
  border-radius:999px;font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;letter-spacing:.14em;font-weight:700;font-size:14px;
}
.round-badge b{color:var(--cyan)}
.timer{color:var(--bone-dim);font-variant-numeric:tabular-nums;font-size:13px}

/* progress through bracket */
.stage-rail{
  display:flex;justify-content:center;gap:6px;margin:18px 0 26px;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;
  letter-spacing:.1em;text-transform:uppercase;
}
.stage-rail span{
  padding:5px 12px;border-radius:6px;color:var(--bone-dim);
  border:1px solid transparent;
}
.stage-rail span.done{color:var(--red)}
.stage-rail span.now{color:var(--bone);border-color:var(--cyan);background:rgba(30,167,225,.12)}

/* duel card */
.duel{
  background:linear-gradient(180deg,var(--night2),var(--night));
  border:1px solid var(--line);border-radius:16px;
  padding:22px 20px;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.duel::before{
  content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:repeating-linear-gradient(90deg,#000 0 14px,var(--flag) 14px 28px);
  opacity:.5;
}
.duel-head{
  display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;
}
.duel-tag{
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.12em;font-size:13px;color:var(--bone-dim);font-weight:600;
}
.duel-total{font-size:12px;color:var(--bone-dim);font-variant-numeric:tabular-nums}

.fighters{display:flex;flex-direction:column;gap:10px}
.fighter{
  display:flex;align-items:center;gap:14px;
  background:#13283d;border:1.5px solid var(--line2);
  border-radius:12px;padding:14px 16px;
  cursor:pointer;text-align:left;width:100%;
  transition:border-color .15s,transform .1s,background .15s;
  position:relative;overflow:hidden;
}
.fighter .bar{
  position:absolute;inset:0;width:var(--pct,0%);
  background:linear-gradient(90deg,rgba(30,167,225,.22),rgba(30,167,225,.05));
  transition:width .5s cubic-bezier(.2,.8,.2,1);z-index:0;
}
.fighter.lead .bar{background:linear-gradient(90deg,rgba(30,167,225,.30),rgba(30,167,225,.06))}
.fighter>*{position:relative;z-index:1}
.fighter:hover:not(.locked){border-color:var(--cyan);transform:translateY(-1px)}
.fighter.picked{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan) inset}
.fighter.locked{cursor:default}
.seed{
  font-family:'Archivo Black',sans-serif;font-size:18px;
  color:#5b86aa;min-width:26px;
}
.fighter.picked .seed{color:var(--cyan)}
.fighter.lead .seed{color:#7fb4d6}
.f-body{flex:1;min-width:0}
.f-logo{
  width:46px;height:46px;flex:0 0 46px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border-radius:10px;overflow:hidden;
  border:1px solid var(--line2);
}
.logo-img{width:100%;height:100%;object-fit:contain;padding:3px}
.f-logo:has(.on-dark){background:var(--night2)}
.champ-logo:has(.on-dark){background:var(--night2)}
.logo-fallback{
  font-family:'Archivo Black',sans-serif;font-size:15px;
  color:var(--night);letter-spacing:.02em;
}
.f-name{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:24px;text-transform:uppercase;letter-spacing:.02em;line-height:1.05;
  color:#ffffff;text-shadow:0 1px 3px rgba(0,0,0,.55);
}
.f-desc{font-size:13px;color:#aebfd0;margin-top:2px}
.f-stat{text-align:right;font-family:'Barlow Condensed',sans-serif}
.f-pct{font-size:24px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;color:#ffffff}
.f-votes{font-size:12px;color:var(--bone-dim);font-variant-numeric:tabular-nums}

.vs{
  text-align:center;font-family:'Archivo Black',sans-serif;
  font-size:13px;color:var(--steel);letter-spacing:.2em;margin:-2px 0;
}

/* voted state banner */
.voted-note{
  margin-top:14px;padding:10px 14px;border-radius:10px;
  background:rgba(226,59,46,.12);border:1px solid rgba(226,59,46,.35);
  font-size:13px;color:var(--red);text-align:center;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;
  text-transform:uppercase;font-weight:600;
}

/* fiche de règles */
.rules-card{
  background:linear-gradient(180deg,var(--night2),var(--night));
  border:1px solid var(--line2);border-radius:16px;
  padding:26px 22px;text-align:center;
}
.rules-title{
  font-family:'Archivo Black',sans-serif;font-size:22px;
  text-transform:uppercase;margin-bottom:16px;color:var(--bone);
}
.rules-list{list-style:none;text-align:left;max-width:460px;margin:0 auto 20px}
.rules-list li{
  position:relative;padding:9px 0 9px 28px;color:var(--bone);
  font-size:15px;line-height:1.4;border-bottom:1px solid var(--line);
}
.rules-list li:last-child{border-bottom:none}
.rules-list li::before{
  content:"🏁";position:absolute;left:0;top:8px;font-size:14px;
}
.rules-btn{
  width:100%;max-width:460px;padding:14px;border-radius:11px;border:none;cursor:pointer;
  background:linear-gradient(180deg,var(--cyan),var(--cyan-deep));
  color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;font-size:16px;
}
.rules-btn:hover{filter:brightness(1.08)}
.rules-btn:disabled{opacity:.4;cursor:not-allowed;filter:none}

/* tour préliminaire : grille d'élimination */
.elim-help{
  text-align:center;color:var(--bone-dim);font-size:14px;
  margin-bottom:16px;line-height:1.4;
}
.elim-help b{color:var(--cyan)}
.elim-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;
}
@media(min-width:560px){ .elim-grid{grid-template-columns:repeat(3,1fr)} }
.elim-card{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;
  background:#13283d;border:1.5px solid var(--line2);border-radius:12px;
  padding:14px 10px;cursor:pointer;text-align:center;
  transition:border-color .15s,transform .1s;
}
.elim-card:hover:not(.locked){border-color:var(--red);transform:translateY(-1px)}
.elim-card.sel{border-color:var(--red);background:rgba(226,59,46,.14);box-shadow:0 0 0 1px var(--red) inset}
.elim-card.locked{cursor:default}
.elim-logo{
  width:54px;height:54px;display:flex;align-items:center;justify-content:center;
  background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--line2);
}
.elim-logo .logo-img{width:100%;height:100%;object-fit:contain;padding:3px}
.elim-logo:has(.on-dark){background:var(--night2)}
.elim-name{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;
  text-transform:uppercase;color:#fff;line-height:1.1;
}
.elim-desc{font-size:11px;color:var(--bone-dim);line-height:1.1}
.elim-badge{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;
}
.elim-count{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--bone-dim);
  font-variant-numeric:tabular-nums;
}


footer{
  text-align:center;margin-top:34px;color:var(--bone-dim);font-size:12px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;text-transform:uppercase;
}
.reset{
  background:none;border:1px solid var(--line);color:var(--bone-dim);
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
  letter-spacing:.1em;font-size:11px;padding:6px 12px;border-radius:6px;
  cursor:pointer;margin-top:14px;
}
.reset:hover{border-color:var(--cyan);color:var(--cyan)}

/* champion */
.champion{
  text-align:center;padding:40px 20px;
  background:radial-gradient(ellipse at 50% 0%,rgba(30,167,225,.20),transparent 70%);
}
.champion .crown{font-size:13px;letter-spacing:.3em;color:var(--cyan);
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-weight:700}
.champ-logo{
  width:110px;height:110px;margin:16px auto 4px;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border-radius:18px;overflow:hidden;
  border:2px solid var(--steel);box-shadow:0 8px 30px rgba(0,0,0,.5);
}
.champ-logo .logo-img{padding:8px}
.champ-logo .logo-fallback{font-size:34px}
.champion .name{
  font-family:'Archivo Black',sans-serif;font-size:clamp(28px,8vw,46px);
  text-transform:uppercase;margin:10px 0;line-height:1;
}
.champion .sub{color:var(--bone-dim);font-size:14px}
</style>
</head>
<body>
<div id="pseudoGate" class="pseudo-gate">
  <div class="pseudo-card">
    <div class="pseudo-title">Avant de voter</div>
    <p class="pseudo-sub">Entre ton <b>prénom + numéro de course</b> (ex. Mathieu 117).<br>Garde le même à chaque visite pour retrouver tes votes.</p>
    <input id="pseudoInput" class="pseudo-input" type="text" maxlength="40" placeholder="Ex. Mathieu 117" autocomplete="off">
    <button id="pseudoBtn" class="pseudo-btn">Entrer dans la coupe</button>
    <div id="pseudoErr" class="pseudo-err"></div>
  </div>
</div>

// ====== BRACKET basé sur les survivants du prélim ======
// survivants = 16 terrains les MOINS éliminés au prélim
function survivors(){
  // si prélim pas terminé, on prend tous les terrains (ordre par id) tronqué à 16
  const ranked = [...CIRCUITS].sort((a,b)=>{
    const ea = prelimCounts[a.id]||0, eb = prelimCounts[b.id]||0;
    if(ea !== eb) return ea - eb;       // moins éliminé d'abord
    return a.id - b.id;                  // égalité -> id le plus petit
  });
  return ranked.slice(0, CIRCUITS.length - PRELIM_ELIM); // garde 16
}
function buildBracket(){
  const surv = survivors();
  // on (re)seede 1..16 selon le classement de survie (le moins éliminé = seed 1)
  surv.forEach((c,i)=>{ c.seed = i+1; });
  const order = seedOrder(surv.length);
  let round=[];
  for(let i=0;i<order.length;i+=2){
    round.push({ a: surv.find(c=>c.seed===order[i]), b: surv.find(c=>c.seed===order[i+1]) });
  }
  return [round];
}
function seedOrder(n){
  let rounds=[[1,2]];
  while(rounds[rounds.length-1].length<n){
    const prev=rounds[rounds.length-1], size=prev.length*2, next=[];
    prev.forEach(s=>{ next.push(s); next.push(size+1-s); });
    rounds.push(next);
  }
  return rounds[rounds.length-1];
}

// ====== COMPTAGE DES VOTES (depuis Supabase) ======
function votesFor(stage, duel, circuitId){
  return counts[stage+"-"+duel+"-"+circuitId] || 0;
}
// le bracket commence au stage 1 (stage 0 = prélim). Décalage interne :
// pour les duels, on stocke round_idx = stage du bracket (1..4)
function winnerOf(stage, duel, a, b){
  if(!a||!b) return a||b||null;
  const va=votesFor(stage,duel,a.id), vb=votesFor(stage,duel,b.id);
  if(va>vb) return a;
  if(vb>va) return b;
  return a.seed<b.seed ? a : b;
}

// reconstruit les rounds du bracket (stages 1..4). closed selon le temps.
function resolveRounds(){
  const rounds=[ buildBracket()[0] ];   // rounds[0] = 8es (stage 1)
  const openStage = currentRoundIdx();  // 0=prélim,1=8es,...
  let cur = rounds[0];
  // stage du bracket : rounds[k] correspond au stage (k+1)
  for(let k=0; k<STAGE_NAMES.length-2 && cur.length>1; k++){
    const stage = k+1;
    const next=[];
    const closed = stage < openStage || tournamentFinished();
    for(let i=0;i<cur.length;i+=2){
      if(closed){
        const d1=cur[i], d2=cur[i+1];
        next.push({ a: winnerOf(stage, i, d1.a, d1.b), b: winnerOf(stage, i+1, d2.a, d2.b) });
      } else {
        next.push({a:null,b:null});
      }
    }
    rounds.push(next);
    cur=next;
  }
  return rounds;
}

// ====== TIMING : durées variables par tour ======
// bornes cumulées (en ms) depuis le départ, pour le DÉBUT de chaque tour
function stageStartOffsets(){
  const offs=[0];
  for(let i=0;i<STAGE_HOURS.length;i++){ offs.push(offs[i] + STAGE_HOURS[i]*3600000); }
  return offs; // offs[i] = début du tour i ; offs[last] = fin de la finale
}
function notStartedYet(){
  if(!tournament) return false;
  return Date.now() < new Date(tournament.started_at).getTime();
}
function msUntilStart(){
  return new Date(tournament.started_at).getTime() - Date.now();
}
function msSinceStart(){
  return Date.now() - new Date(tournament.started_at).getTime();
}
// index du tour ouvert actuellement (0 = prélim … 4 = finale)
function currentRoundIdx(){
  const t = msSinceStart();
  const offs = stageStartOffsets();
  for(let i=STAGE_HOURS.length-1; i>=0; i--){
    if(t >= offs[i]) return i;
  }
  return 0;
}
function tournamentFinished(){
  const offs = stageStartOffsets();
  return msSinceStart() >= offs[offs.length-1];
}
// temps restant avant la fin du tour courant
function msUntilNextRound(){
  const offs = stageStartOffsets();
  const idx = currentRoundIdx();
  const end = new Date(tournament.started_at).getTime() + offs[idx+1];
  return end - Date.now();
}

// ====== RENDU ======
function logoFor(c){
  const b64 = LOGOS[c.id];
  const darkBadge = (c.id===7);
  if(b64) return `<img class="logo-img${darkBadge?' on-dark':''}" src="data:image/png;base64,${b64}" alt="${c.name}" loading="lazy">`;
  const initials = c.name.replace(/[^A-Za-zÀ-ÿ0-9]/g,'').slice(0,2).toUpperCase();
  return `<span class="logo-fallback">${initials}</span>`;
}

function fighterRow(c, votes, pct, lead, picked, stage, di){
  return `<button class="fighter ${lead?'lead':''} ${picked?'picked':''}"
      data-pick="${c.id}" data-stage="${stage}" data-duel="${di}" style="--pct:${pct}%">
    <span class="bar"></span>
    <span class="seed">#${c.seed}</span>
    <span class="f-logo">${logoFor(c)}</span>
    <span class="f-body">
      <span class="f-name">${c.name}</span>
      <span class="f-desc">${c.desc}</span>
    </span>
    <span class="f-stat">
      <span class="f-pct">${pct}%</span>
      <span class="f-votes">${votes} votes</span>
    </span>
  </button>`;
}

function renderDuel(d, i, stage){
  if(!d.a||!d.b){
    return `<div class="duel"><div class="duel-tag">En attente du round précédent…</div></div>`;
  }
  const va=votesFor(stage,i,d.a.id), vb=votesFor(stage,i,d.b.id), tot=va+vb||1;
  const pa=Math.round(va/tot*100), pb=100-pa;
  const myPick = myVotes[stage+"-"+i];
  const votedThis = myPick===d.a.id || myPick===d.b.id;

  return `<div class="duel" data-duel="${i}">
    <div class="duel-head">
      <span class="duel-tag">${STAGE_NAMES[stage]} · Duel ${i+1}</span>
      <span class="duel-total">${va+vb} votes</span>
    </div>
    <div class="fighters">
      ${fighterRow(d.a,va,pa,va>=vb,myPick===d.a.id,stage,i)}
      <div class="vs">VS</div>
      ${fighterRow(d.b,vb,pb,vb>va,myPick===d.b.id,stage,i)}
    </div>
    ${votedThis?`<div class="voted-note">✓ Vote enregistré pour ce duel</div>`:''}
  </div>`;
}

function render(){
  // pas encore commencé : écran d'attente
  if(notStartedYet()){
    stageRail.innerHTML = STAGE_NAMES.map((nm,i)=>`<span class="${i===0?'now':''}">${nm}</span>`).join('');
    roundLabel.innerHTML = `Round <b>à venir</b>`;
    arena.innerHTML = `<div class="champion">
      <div class="crown">⏳ Ouverture des votes</div>
      <div class="name" id="countdownStart" style="font-size:clamp(26px,7vw,42px)">—</div>
      <div class="sub">Le vote ouvre mardi 23/06 à 12h00. Reviens à ce moment-là !</div>
    </div>`;
    return;
  }

  const finished = tournamentFinished();
  const stage = finished ? STAGE_NAMES.length-1 : currentRoundIdx();

  // rail
  stageRail.innerHTML = STAGE_NAMES.map((nm,i)=>{
    let cls = i<stage?'done': i===stage?'now':'';
    return `<span class="${cls}">${nm}</span>`;
  }).join('');
  roundLabel.innerHTML = finished ? `Round <b>Terminé</b>` : `Round <b>${STAGE_NAMES[stage]}</b>`;

  // champion (après la finale)
  if(finished){
    const rounds = resolveRounds();
    const final = rounds[rounds.length-1][0];
    const champ = winnerOf(STAGE_NAMES.length-2, 0, final.a, final.b);
    if(champ){
      arena.innerHTML=`<div class="champion">
        <div class="crown">🏁 Terrain élu 🏁</div>
        <div class="champ-logo">${logoFor(champ)}</div>
        <div class="name">${champ.name}</div>
        <div class="sub">${champ.desc}</div>
      </div>`;
      return;
    }
  }

  // fiche de règles à valider avant de voter ce tour ?
  if(!acceptedRules[stage]){
    renderRules(stage);
    return;
  }

  // stage 0 = tour préliminaire (grille d'élimination)
  if(stage === 0){
    renderPrelim();
    return;
  }

  // stages 1..4 = bracket en duels
  const rounds = resolveRounds();
  const duels = rounds[stage-1];   // rounds[0] = 8es = stage 1
  arena.innerHTML = duels.map((d,i)=>renderDuel(d,i,stage)).join('');
  bindFighters(stage);
}

// ====== FICHE DE RÈGLES ======
function renderRules(stage){
  const r = STAGE_RULES[stage];
  if(!r){ acceptedRules[stage]=true; render(); return; }
  arena.innerHTML = `<div class="rules-card">
    <div class="rules-title">${r.title}</div>
    <ul class="rules-list">${r.lines.map(l=>`<li>${l}</li>`).join('')}</ul>
    <button class="rules-btn" id="rulesOk">J'ai compris</button>
  </div>`;
  document.getElementById('rulesOk').addEventListener('click', ()=>{
    acceptedRules[stage]=true;
    render();
  });
}

// ====== TOUR PRÉLIMINAIRE (grille, coche 4 à éliminer) ======
function renderPrelim(){
  const selected = Object.keys(myPrelim).filter(k=>myPrelim[k]).length;
  const locked = prelimSubmitted;        // déjà validé ?
  const remaining = PRELIM_ELIM - selected;

  const cards = CIRCUITS.map(c=>{
    const isSel = myPrelim[c.id];
    const elim = prelimCounts[c.id]||0;
    return `<button class="elim-card ${isSel?'sel':''} ${locked?'locked':''}" data-elim="${c.id}">
      <span class="elim-logo">${logoFor(c)}</span>
      <span class="elim-name">${c.name}</span>
      <span class="elim-desc">${c.desc}</span>
      ${locked?`<span class="elim-count">${elim} ✕</span>`:''}
      ${isSel?'<span class="elim-badge">✕ à éliminer</span>':''}
    </button>`;
  }).join('');

  const banner = locked
    ? `<div class="voted-note">✓ Tes éliminations sont enregistrées</div>`
    : `<div class="elim-help">Coche les <b>${PRELIM_ELIM} terrains</b> que tu veux éliminer.
        ${remaining>0?`Encore <b>${remaining}</b> à choisir.`:`<b>Prêt à valider !</b>`}</div>`;

  arena.innerHTML = `
    ${banner}
    <div class="elim-grid">${cards}</div>
    ${(!locked)?`<button class="rules-btn" id="prelimSubmit" ${selected!==PRELIM_ELIM?'disabled':''}>
        Valider mes ${PRELIM_ELIM} éliminations</button>`:''}
  `;

  if(!locked){
    document.querySelectorAll('.elim-card[data-elim]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = +btn.dataset.elim;
        if(myPrelim[id]){ delete myPrelim[id]; }
        else {
          if(Object.keys(myPrelim).filter(k=>myPrelim[k]).length >= PRELIM_ELIM) return;
          myPrelim[id] = true;
        }
        renderPrelim();
      });
    });
    const sub = document.getElementById('prelimSubmit');
    if(sub) sub.addEventListener('click', submitPrelim);
  }
}

// ====== VALIDATION DU PRÉLIM ======
async function submitPrelim(){
  if(prelimSubmitted) return;
  if(currentRoundIdx() !== 0) return;
  const ids = Object.keys(myPrelim).filter(k=>myPrelim[k]).map(Number);
  if(ids.length !== PRELIM_ELIM) return;

  prelimSubmitted = true;
  ids.forEach(id=>{ prelimCounts[id] = (prelimCounts[id]||0)+1; });
  render();

  const rows = ids.map(id=>({ nickname, circuit_id:id }));
  const { error } = await sb.from('prelim_votes').insert(rows);
  if(error){
    prelimSubmitted = false;
    ids.forEach(id=>{ prelimCounts[id]--; });
    await loadVotes();
    render();
  }
}

// ====== VOTE (bracket, stages 1..4) ======
function bindFighters(stage){
  document.querySelectorAll('.fighter[data-pick]').forEach(btn=>{
    btn.addEventListener('click', ()=>castVote(btn));
  });
}

async function castVote(btn){
  const circuitId = +btn.dataset.pick;
  const stage = +btn.dataset.stage;
  const duel  = +btn.dataset.duel;
  const key = stage+"-"+duel;

  if(myVotes[key]) return;              // déjà voté ce duel
  if(stage !== currentRoundIdx())  return; // on ne vote que le round ouvert

  myVotes[key] = circuitId;
  counts[stage+"-"+duel+"-"+circuitId] = (counts[stage+"-"+duel+"-"+circuitId]||0)+1;
  render();

  const { error } = await sb.from('votes').insert({
    nickname, round_idx: stage, duel_idx: duel, circuit_id: circuitId
  });
  if(error){
    delete myVotes[key];
    counts[stage+"-"+duel+"-"+circuitId]--;
    await loadVotes();
    render();
  }
}

// ====== CHARGEMENT DONNÉES ======
async function loadTournament(){
  const { data } = await sb.from('tournament').select('*').eq('id',1).single();
  tournament = data || { started_at: new Date().toISOString(), round_hours:48, total_rounds:4 };
}
async function loadVotes(){
  counts = {}; myVotes = {};
  const { data } = await sb.from('votes').select('nickname,round_idx,duel_idx,circuit_id');
  (data||[]).forEach(v=>{
    const k = v.round_idx+"-"+v.duel_idx+"-"+v.circuit_id;
    counts[k] = (counts[k]||0)+1;
    if(v.nickname === nickname){
      myVotes[v.round_idx+"-"+v.duel_idx] = v.circuit_id;
    }
  });
  // votes du tour préliminaire
  prelimCounts = {}; myPrelim = {}; prelimSubmitted = false;
  const { data: pdata } = await sb.from('prelim_votes').select('nickname,circuit_id');
  (pdata||[]).forEach(v=>{
    prelimCounts[v.circuit_id] = (prelimCounts[v.circuit_id]||0)+1;
    if(v.nickname === nickname){
      myPrelim[v.circuit_id] = true;
      prelimSubmitted = true;
    }
  });
}

// ====== TIMER ======
function fmt(ms){
  const h=String(Math.floor(ms/3600000)).padStart(2,'0');
  const m=String(Math.floor(ms%3600000/60000)).padStart(2,'0');
  const s=String(Math.floor(ms%60000/1000)).padStart(2,'0');
  return `${h}:${m}:${s}`;
}
function tick(){
  if(!tournament) return;
  const el = document.getElementById('timer');

  // pas encore commencé : compte à rebours jusqu'au lancement
  if(notStartedYet()){
    const left = msUntilStart();
    const days = Math.floor(left/86400000);
    const big = document.getElementById('countdownStart');
    if(big) big.textContent = (days>0?days+"j ":"") + fmt(left%86400000);
    if(el) el.textContent = "vote pas encore ouvert";
    return;
  }

  if(tournamentFinished()){ el.textContent = "coupe terminée"; return; }
  el.textContent = `${fmt(msUntilNextRound())} avant rotation`;
}

// ====== ÉCRAN PSEUDO ======
function showPseudoGate(){
  const gate = document.getElementById('pseudoGate');
  const input = document.getElementById('pseudoInput');
  const btn = document.getElementById('pseudoBtn');
  const err = document.getElementById('pseudoErr');
  if(nickname){ gate.classList.add('hidden'); return; }
  btn.addEventListener('click', ()=>{
    const v = input.value.trim();
    if(v.length < 2){ err.textContent = "Pseudo trop court (2 caractères min)."; return; }
    nickname = v;
    localStorage.setItem("mcm_nick", v);
    gate.classList.add('hidden');
    start();
  });
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') btn.click(); });
  input.focus();
}

// ====== DÉMARRAGE ======
async function start(){
  try {
    await loadTournament();
    await loadVotes();
    render();
    tick();
    setInterval(async ()=>{ try{ await loadVotes(); render(); tick(); }catch(e){} }, 8000);
    setInterval(tick, 1000);
  } catch(e){
    arena.innerHTML = '<div style="padding:20px;text-align:center;color:#8fa6bb">'
      +'Impossible de charger les votes pour le moment.<br>'+(e.message||e)+'</div>';
  }
}

// init (seulement si le client Supabase est prêt)
if(sb){
  if(nickname){
    document.getElementById('pseudoGate').classList.add('hidden');
    start();
  } else {
    showPseudoGate();
  }
}
</script>
