// ----- écran de prono d'une manche (250 + 450) -----
async function openMancheProno(mancheId, manche){
  const v = document.getElementById('view');
  const closed = isClosed(manche);
  v.innerHTML = `<div class="card"><div class="loading">Chargement…</div></div>`;

  // charger mes pronos existants pour cette manche
  const { data: existing } = await sb.from('pronos').select('*')
    .eq('user_id', currentSession.user.id).eq('manche_id', mancheId);
  const byCat = {};
  (existing||[]).forEach(p=> byCat[p.categorie]=p);
  const aDejaPronostique = (existing||[]).length > 0;

  // date de fermeture lisible
  const closeStr = manche.closes_at
    ? new Date(manche.closes_at).toLocaleString('fr-FR',{weekday:'long',day:'2-digit',month:'long',hour:'2-digit',minute:'2-digit'})
    : null;

  // bandeau de statut clair
  let statusBanner;
  if(closed){
    statusBanner = `<div class="status-banner closed">🔒 Pronostics fermés — non modifiable</div>`;
  } else if(aDejaPronostique){
    statusBanner = `<div class="status-banner done">✓ Tu as déjà pronostiqué${closeStr?` — modifiable jusqu'au ${closeStr}`:''}</div>`;
  } else {
    statusBanner = `<div class="status-banner open">À pronostiquer${closeStr?` — ferme le ${closeStr}`:''}</div>`;
  }

  v.innerHTML = `
    <div class="card">
      <button class="back" id="back">← Retour aux manches</button>
      <div class="sec-title">${manche.nom}</div>
      <p class="sec-sub">${frDate(manche.date_course)}</p>
      ${statusBanner}
      ${isNations() ? mxdnStatsBlock() : ''}
      ${closed ? '' : `<div class="countdown-banner" data-countdown="${manche.closes_at||''}">${countdownText(manche.closes_at)}</div>`}
      ${mancheCats(manche).map(c=> podiumBlock(c, byCat[c], closed)).join('')}
      ${closed ? '' : `<button class="propose-btn" id="proposeBtn">+ Proposer ${isNations()?'une nation absente':'un pilote absent'} de la liste</button>`}
      <div class="msg" id="pmsg"></div>
      ${closed ? '' : `<button class="btn" id="savePronos">${aDejaPronostique?'Modifier mes pronostics':'Enregistrer mes pronostics'}</button>`}
      ${(!closed && aDejaPronostique) ? `<button class="btn-del" id="delPronos">Supprimer mon pronostic</button>` : ''}
      ${closed ? `<div id="clubPronos" class="club-pronos"><div class="loading">Chargement des pronos du club…</div></div>` : ''}
    </div>
  `;
  document.getElementById('back').onclick = ()=>{ switchView('pronos'); };
  if(closed){
    renderClubPronos(mancheId, manche);
  }
  if(!closed){
    mancheCats(manche).forEach(c=>setupPodium(c));
    document.getElementById('savePronos').onclick = ()=>saveMancheProno(mancheId, manche);
    document.getElementById('proposeBtn').onclick = ()=>openProposeForm();
    const delBtn = document.getElementById('delPronos');
    if(delBtn) delBtn.onclick = ()=>deleteMancheProno(mancheId, manche);
    startCountdowns();
  }
}

// ====== VUE PRONOS DU CLUB (tous championnats, groupé par joueur) ======
async function renderClubAll(v){
  v.innerHTML = `<div class="card"><div class="loading">Chargement des pronos du club…</div></div>`;

  const [profilsR, pilotesR, manchesR, pronosR, pchampR] = await Promise.all([
    sb.from('profils').select('id,pseudo,avatar,prenom,nom,last_seen'),
    sb.from('pilotes').select('id,nom,numero,championnat'),
    sb.from('manches').select('*'),
    sb.from('pronos').select('*'),
    sb.from('pronos_championnat').select('*')
  ]);
  const profils = profilsR.data || [];
  const pilotes = pilotesR.data || [];
  const manches = manchesR.data || [];
  const pronos  = pronosR.data || [];
  const pchamp  = pchampR.data || [];

  // maps
  const pidName = {};
  pilotes.forEach(p=>{
    pidName[p.id] = (p.championnat==='MXdN') ? p.nom : `${p.nom}${p.numero?` #${p.numero}`:''}`;
  });
  const mById = {};
  manches.forEach(m=> mById[m.id]=m);

  // ne garder que les pronos de manches FERMÉES
  const closedPronos = pronos.filter(pr=>{
    const m = mById[pr.manche_id];
    return m && isClosed(m);
  });

  // grouper par joueur -> championnat -> manche(ordre) -> [pronos par cat]
  const byUser = {};
  closedPronos.forEach(pr=>{
    const m = mById[pr.manche_id];
    (byUser[pr.user_id] = byUser[pr.user_id] || {});
    const champ = m.championnat;
    (byUser[pr.user_id][champ] = byUser[pr.user_id][champ] || {});
    const key = m.ordre + '|' + m.nom;
    (byUser[pr.user_id][champ][key] = byUser[pr.user_id][champ][key] || []).push(pr);
  });

  // INTEL : manches à venir (ouvertes) où le joueur a déjà misé, SANS le contenu
  const intelByUser = {};
  pronos.forEach(pr=>{
    const m = mById[pr.manche_id];
    if(!m || m.annulee) return;
    if(isClosed(m)) return; // seulement les manches encore ouvertes
    const set = intelByUser[pr.user_id] = intelByUser[pr.user_id] || {};
    // clé unique par manche pour dédupliquer les catégories, on garde ordre pour le tri
    set[m.id] = { nom:m.nom, champ:m.championnat, ordre:m.ordre };
  });

  // PRONOS CHAMPIONNAT : révélés seulement pour les championnats TERMINÉS
  // (on recharge l'état terminé pour être sûr qu'il est à jour)
  let champTermine = {};
  try{
    const { data: meta } = await sb.from('championnats_meta').select('championnat,termine');
    (meta||[]).forEach(r=>{ champTermine[r.championnat] = !!r.termine; });
  }catch(e){ champTermine = {...CHAMP_TERMINE}; }
  // champPronosByUser[uid][champ] = [ligne par catégorie]
  const champPronosByUser = {};
  pchamp.forEach(pc=>{
    if(!champTermine[pc.championnat]) return; // pas révélé tant que le champ n'est pas terminé
    const u = champPronosByUser[pc.user_id] = champPronosByUser[pc.user_id] || {};
    (u[pc.championnat] = u[pc.championnat] || []).push(pc);
  });

  // PARTICIPATION au prono championnat : qui a joué / pas joué (sans révéler le contenu)
  // on regarde les championnats qui ont AU MOINS un prono championnat (donc concernés)
  const champsAvecProno = [...new Set(pchamp.map(pc=>pc.championnat))];
  const aJoueChamp = {}; // aJoueChamp[champ] = Set(user_id)
  champsAvecProno.forEach(c=> aJoueChamp[c] = new Set());
  pchamp.forEach(pc=>{ aJoueChamp[pc.championnat].add(pc.user_id); });

  // tri des joueurs : actifs (podiums passés OU intel à venir) d'abord, par pseudo
  profils.forEach(p=>{ if(p.avatar) AVATARS[p.id]=p.avatar; });
  const isActive = id => !!byUser[id] || !!intelByUser[id] || !!champPronosByUser[id];
  const players = profils.slice().sort((a,b)=>{
    const ca = isActive(a.id)?1:0, cb = isActive(b.id)?1:0;
    if(ca!==cb) return cb-ca;
    return (a.pseudo||'').localeCompare(b.pseudo||'');
  });

  const champOrder = ['SXUS','AMA','SMX','MXGP','Vendée','MXdN'];

  // bloc "intel" : manches à venir où le joueur a déjà misé (sans le contenu)
  const intelBlock = (uid)=>{
    const set = intelByUser[uid];
    if(!set || !Object.keys(set).length) return '';
    const list = Object.values(set).sort((a,b)=> (CHAMP_LABELS[a.champ]||a.champ).localeCompare(CHAMP_LABELS[b.champ]||b.champ) || a.ordre-b.ordre);
    const tags = list.map(it=>`<span class="cl-intel-tag">${it.nom} <span class="cl-intel-champ">${CHAMP_LABELS[it.champ]||it.champ}</span></span>`).join('');
    return `<div class="cl-intel">
      <div class="cl-intel-head">👀 A déjà misé sur (à venir)</div>
      <div class="cl-intel-tags">${tags}</div>
    </div>`;
  };

  const totalRevealed = closedPronos.length;
  const totalIntel = Object.keys(intelByUser).length;
  if(totalRevealed===0 && totalIntel===0){
    v.innerHTML = `<div class="card">
      <div class="sec-title">👥 Pronos du club</div>
      <div class="cl-empty">Aucun prono pour le moment.<br>Les podiums révélés apparaissent ici dès qu'une manche est <b>fermée</b>, et l'intel sur les manches à venir dès que les joueurs misent. 🐺</div>
    </div>`;
    return;
  }

  // bloc "pronos championnat" (podium final) — révélé si le championnat est terminé
  const champBlock = (uid)=>{
    const byChamp = champPronosByUser[uid];
    if(!byChamp || !Object.keys(byChamp).length) return '';
    const blocks = champOrder.filter(c=>byChamp[c]).map(champ=>{
      const arr = byChamp[champ];
      const rows = arr.map(pc=>{
        const l1=pidName[pc.p1_pilote_id]||'?', l2=pidName[pc.p2_pilote_id]||'?', l3=pidName[pc.p3_pilote_id]||'?';
        const l5 = pc.joue_bonus5 ? (pidName[pc.p5_pilote_id]||'?') : null;
        const catTag = (arr.length>1) ? `<span class="cl-cat">${pc.categorie}</span>` : '';
        return `<div>${catTag}🥇 ${l1} · 🥈 ${l2} · 🥉 ${l3}${l5?` · <span class="cl-5">5e ${l5}</span>`:''}</div>`;
      }).join('');
      return `<div class="cl-row"><span class="cl-manche">🏆 ${CHAMP_LABELS[champ]||champ}</span><span class="cl-pod">${rows}</span></div>`;
    }).join('');
    return `<div class="cl-champ-final"><div class="cl-cf-head">🏆 Podiums championnat (final)</div>${blocks}</div>`;
  };

  const playersHtml = players.map(pl=>{
    const data = byUser[pl.id];
    const col = avatarBg(pl.id, pl.pseudo);
    const intel = intelBlock(pl.id);
    const ini = avatarInner(pl.id, pl.pseudo);
    // avatar avec pastille de présence + statut (en ligne / vu il y a X)
    const isOnline = onlineUsers.has(pl.id);
    const avaHtml = `<span class="cl-ava-wrap"><span class="cl-ava" style="background:${col}">${ini}</span><span class="cl-dot ${isOnline?'on':''}" data-uid="${pl.id}"></span></span>`;
    const statutHtml = isOnline
      ? `<span class="cl-seen online" data-uid="${pl.id}">● en ligne</span>`
      : `<span class="cl-seen" data-uid="${pl.id}">${timeAgo(pl.last_seen)}</span>`;
    // identité affichée dans le détail : "Prénom N." (uniquement ici, dans Le club)
    const prenom = (pl.prenom||'').trim();
    const nomIni = (pl.nom||'').trim().charAt(0).toUpperCase();
    const identite = (prenom || nomIni)
      ? `<div class="cl-identite">${prenom}${nomIni?` ${nomIni}.`:''}</div>`
      : '';

    if(!data){
      // pas de podium de manche révélé, mais peut-être de l'intel ou des pronos championnat
      const cf = champBlock(pl.id);
      const hasContent = intel || cf;
      const sub = cf ? "podium champ. révélé 🏆" : (intel ? "pronos à venir 👀" : "aucun prono révélé");
      const inner = hasContent ? `${cf}${intel}` : `<div class="cl-none">Ce joueur n'a pas encore de prono.</div>`;
      return `<div class="cl-player" data-uid="${pl.id}">
        <div class="cl-phead">
          ${avaHtml}
          <span class="cl-pname">${pl.pseudo} ${statutHtml}</span>
          <span class="cl-pcount">${sub}</span>
          <span class="cl-chev">▸</span>
        </div>
        <div class="cl-pbody"><div class="cl-pinner">${identite}${inner}</div></div>
      </div>`;
    }
    // nombre total de podiums mis
    let nb = 0;
    Object.values(data).forEach(champ=> Object.values(champ).forEach(arr=> nb+=arr.length));

    const champsHtml = champOrder.filter(c=>data[c]).map(champ=>{
      // trier les manches par ordre
      const keys = Object.keys(data[champ]).sort((a,b)=> parseInt(a)-parseInt(b));
      const rows = keys.map(k=>{
        const nom = k.split('|')[1];
        const arr = data[champ][k];
        const pods = arr.map(pr=>{
          const l1=pidName[pr.p1_pilote_id]||'?', l2=pidName[pr.p2_pilote_id]||'?', l3=pidName[pr.p3_pilote_id]||'?';
          const l5 = pr.joue_bonus5 ? (pidName[pr.p5_pilote_id]||'?') : null;
          const catTag = (arr.length>1 || champ!=='MXdN') ? `<span class="cl-cat">${pr.categorie}</span>` : '';
          return `<div>${catTag}🥇 ${l1} · 🥈 ${l2} · 🥉 ${l3}${l5?` · <span class="cl-5">5e ${l5}</span>`:''}</div>`;
        }).join('');
        return `<div class="cl-row"><span class="cl-manche">${nom}</span><span class="cl-pod">${pods}</span></div>`;
      }).join('');
      return `<div class="cl-champ">${CHAMP_LABELS[champ]||champ}</div>${rows}`;
    }).join('');

    return `<div class="cl-player" data-uid="${pl.id}">
      <div class="cl-phead">
        ${avaHtml}
        <span class="cl-pname">${pl.pseudo} ${statutHtml}</span>
        <span class="cl-pcount">${nb} podium${nb>1?'s':''}</span>
        <span class="cl-chev">▸</span>
      </div>
      <div class="cl-pbody"><div class="cl-pinner">${identite}${champsHtml}${champBlock(pl.id)}${intel}</div></div>
    </div>`;
  }).join('');

  // ----- section participation au prono championnat -----
  const pseudoById = {}; profils.forEach(p=> pseudoById[p.id]=p.pseudo);
  const participationHtml = champsAvecProno.length ? champOrder.filter(c=>champsAvecProno.includes(c)).map(champ=>{
    const joue = aJoueChamp[champ];
    const ontJoue = profils.filter(p=> joue.has(p.id));
    const pasJoue = profils.filter(p=> !joue.has(p.id));
    const chip = (p,on)=> `<span class="part-chip ${on?'on':'off'}">${p.pseudo}</span>`;
    return `<div class="part-champ">
      <div class="part-head">
        <span class="part-title">🏆 ${CHAMP_LABELS[champ]||champ}</span>
        <span class="part-count">${ontJoue.length}/${profils.length} ont joué</span>
      </div>
      <div class="part-group">
        <div class="part-lbl on">✓ Ont fait leur podium (${ontJoue.length})</div>
        <div class="part-chips">${ontJoue.length ? ontJoue.map(p=>chip(p,true)).join('') : '<span class="part-none">Personne pour l\'instant</span>'}</div>
      </div>
      <div class="part-group">
        <div class="part-lbl off">✗ Pas encore joué (${pasJoue.length})</div>
        <div class="part-chips">${pasJoue.length ? pasJoue.map(p=>chip(p,false)).join('') : '<span class="part-none">Tout le monde a joué ! 🎉</span>'}</div>
      </div>
    </div>`;
  }).join('') : '';

  const participationSection = participationHtml ? `
    <div class="part-box">
      <div class="part-box-head">📋 Participation aux pronos championnat</div>
      <div class="part-box-sub">Qui a fait son podium final (le contenu reste secret jusqu'à la fin du championnat).</div>
      ${participationHtml}
    </div>` : '';

  v.innerHTML = `<div class="card">
    <div class="sec-title">👥 Pronos du club</div>
    <div class="cl-intro">Les pronos de tout le monde, tous championnats confondus. Les manches <b>fermées</b> et les podiums championnat des championnats <b>terminés</b> sont révélés — touche un joueur pour déplier ses pronos.</div>
    ${participationSection}
    ${playersHtml}
  </div>`;

  // accordéon
  v.querySelectorAll('.cl-phead').forEach(head=>{
    head.onclick = ()=>{
      const card = head.closest('.cl-player');
      card.classList.toggle('open');
    };
  });

  // mise à jour en direct des pastilles quand la présence change
  const refreshDots = (online)=>{
    v.querySelectorAll('.cl-dot').forEach(dot=>{
      const uid = dot.dataset.uid;
      dot.classList.toggle('on', online.has(uid));
    });
    v.querySelectorAll('.cl-seen').forEach(el=>{
      const uid = el.dataset.uid;
      if(online.has(uid)){ el.textContent='● en ligne'; el.classList.add('online'); }
    });
  };
  onPresenceChange(refreshDots);
  refreshDots(onlineUsers);
}

// Affiche les pronos de tous les joueurs pour une manche fermée
async function renderClubPronos(mancheId, manche){
  const box = document.getElementById('clubPronos');
  if(!box) return;
  await loadPilotes();
  const nat = isNations();
  const [pronosR, profilsR] = await Promise.all([
    sb.from('pronos').select('*').eq('manche_id', mancheId),
    sb.from('profils').select('id,pseudo,avatar'),
  ]);
  const pronos = pronosR.data||[];
  if(!pronos.length){
    box.innerHTML = `<div class="cp-head">👥 Les pronos du club</div>
      <div class="cp-empty">Personne n'avait pronostiqué cette épreuve.</div>`;
    return;
  }
  const pseudo = {}; (profilsR.data||[]).forEach(p=> pseudo[p.id]=p.pseudo||'?');
  const pidName = {}; allPilotes().forEach(p=> pidName[p.id]= nat ? p.nom : p.nom);

  // regrouper par catégorie puis par joueur
  const cats = mancheCats(manche);
  let html = `<div class="cp-head">👥 Les pronos du club</div>
    <p class="cp-sub">Maintenant que c'est fermé, voici ce que tout le monde a misé 🍿</p>`;
  cats.forEach(c=>{
    const lignes = pronos.filter(p=> p.categorie===c);
    if(!lignes.length) return;
    const tag = nat ? '<span class="cat-tag cat-nations">🏆 Nations</span>' : `<span class="cat-tag ${catClass(c)}">${catLabel(c)}</span>`;
    html += `<div class="cp-cat">${tag}</div>`;
    lignes.sort((a,b)=> (pseudo[a.user_id]||'').localeCompare(pseudo[b.user_id]||''));
    lignes.forEach(p=>{
      const l1 = pidName[p.p1_pilote_id]||'?';
      const l2 = pidName[p.p2_pilote_id]||'?';
      const l3 = pidName[p.p3_pilote_id]||'?';
      const l5 = p.joue_bonus5 ? (pidName[p.p5_pilote_id]||'?') : null;
      html += `<div class="cp-row">
        <div class="cp-user">${pseudo[p.user_id]||'?'}</div>
        <div class="cp-pod">🥇 ${l1} · 🥈 ${l2} · 🥉 ${l3}${l5?` · <span class="cp-b5">5e ${l5}</span>`:''}</div>
      </div>`;
    });
  });
  box.innerHTML = html;
}

function podiumBlock(cat, existing, closed){
  const nat = isNations();
  const pilotes = pilotesForCat(cat);
  const opt = (selId)=> '<option value="">—</option>' + pilotes.map(p=>
    `<option value="${p.id}" ${selId==p.id?'selected':''}>${nat ? p.nom : `#${p.numero||'?'} ${p.nom}`}</option>`).join('');
  const dis = closed ? 'disabled' : '';
  const e = existing||{};
  const titre = nat ? 'Podium des nations' : 'Podium';
  const tag = nat ? '<span class="cat-tag cat-nations">🏆 Nations</span>' : `<span class="cat-tag ${catClass(cat)}">${catLabel(cat)}</span>`;
  return `
    <div class="podium" data-cat="${cat}">
      <div class="podium-head">${tag} ${titre}</div>
      <div class="pod-row"><label>1<sup>er</sup></label><select ${dis} data-pos="p1">${opt(e.p1_pilote_id)}</select></div>
      <div class="pod-row"><label>2<sup>e</sup></label><select ${dis} data-pos="p2">${opt(e.p2_pilote_id)}</select></div>

function setupPodium(cat){
  const block = document.querySelector(`.podium[data-cat="${cat}"]`);
  const selects = [...block.querySelectorAll('select[data-pos]')];
  // empêcher de choisir 2x le même pilote (sur p1/p2/p3)
  const refresh = ()=>{
    const chosen = selects.filter(s=>['p1','p2','p3'].includes(s.dataset.pos)).map(s=>s.value).filter(Boolean);
    selects.forEach(s=>{
      if(!['p1','p2','p3'].includes(s.dataset.pos)) return;
      [...s.options].forEach(o=>{
        if(!o.value) return;
        o.disabled = chosen.includes(o.value) && s.value !== o.value;
      });
    });
  };
  selects.forEach(s=> s.onchange = refresh);
  refresh();
  // toggle bonus 5e
  const chk = block.querySelector('input[data-bonus5]');
  chk.onchange = ()=>{
    block.querySelector('.bonus5').classList.toggle('hidden', !chk.checked);
  };
}

async function saveMancheProno(mancheId, manche){
  if(isClosed(manche)){ return showPMsg("Cette manche est fermée.", 'err'); }
  const rows = [];
  for(const cat of mancheCats(manche)){
    const block = document.querySelector(`.podium[data-cat="${cat}"]`);
    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;
    const bonus = block.querySelector('input[data-bonus5]').checked;
    const p1=get('p1'), p2=get('p2'), p3=get('p3'), p5=bonus?get('p5'):null;
    // validation : podium complet requis si on enregistre cette catégorie
    if(p1||p2||p3){
      if(!(p1&&p2&&p3)) return showPMsg(`Complète tout le podium ${cat} (1er, 2e, 3e).`, 'err');
      if(bonus && !p5) return showPMsg(`Choisis ton pilote 5e en ${cat} ou décoche le bonus.`, 'err');
      rows.push({ user_id: currentSession.user.id, manche_id: mancheId, categorie: cat,
        p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, joue_bonus5:bonus });

let CHAMP_CLOSES_AT = undefined;
let CHAMP_CLOSES_LOADED_FOR = null; // pour quel championnat la date est chargée

// convertit une date ISO en valeur pour <input type="datetime-local"> (heure locale)
function toLocalInput(iso){
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function loadConfig(){
  if(CHAMP_CLOSES_LOADED_FOR === currentChamp) return; // déjà chargé pour ce champ
  const { data } = await sb.from('config_champ').select('champ_closes_at')
    .eq('championnat', currentChamp).maybeSingle();
  CHAMP_CLOSES_AT = data?.champ_closes_at || null;
  CHAMP_CLOSES_LOADED_FOR = currentChamp;
  // s'assurer que l'état "terminé" est connu pour ce championnat
  if(CHAMP_TERMINE[currentChamp] === undefined){
    try{
      const { data: m } = await sb.from('championnats_meta').select('termine').eq('championnat', currentChamp).maybeSingle();
      CHAMP_TERMINE[currentChamp] = !!(m && m.termine);
    }catch(e){}
  }
}

function champClosed(){
  // championnat marqué "Terminé" => prono championnat fermé
  if(CHAMP_TERMINE[currentChamp]) return true;
  if(!CHAMP_CLOSES_AT) return false;
  return Date.now() >= new Date(CHAMP_CLOSES_AT).getTime();
}

async function saveChampProno(){

    const block = document.querySelector(`.podium.champ[data-cat="${cat}"]`);

    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;

      p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, joue_bonus5:bonus, valide:true });

async function deleteChampProno(){
  if(champClosed()){ alert("Les pronostics championnat sont fermés, ils ne peuvent plus être supprimés."); return; }

  const { error } = await sb.from('pronos_championnat').delete()
    .eq('user_id', currentSession.user.id).eq('championnat', currentChamp);

// construit "MXGP", "MXGP et Vendée", "MXGP, Vendée et SX US"
function joinChamps(list){
  const names = list.map(c=> CHAMP_LABELS[c]||c);

        <span class="m-state">${resState}</span>
      </button>
      <div class="admin-row-actions">
        <button class="open-btn" data-openclose="${m.id}">
          ${isClosed(m) ? '🔓 Rouvrir les pronos' : '🔒 Fermer les pronos'}
        </button>
        <button class="annul-btn" data-annul="${m.id}" data-etat="${m.annulee?1:0}">
          ${m.annulee?'Réactiver':'Annuler'}
        </button>
      </div>
    </div>`;
  }).join('');

  // bloc "classement final du championnat" (sauf MXdN qui n'a pas de prono championnat)
  const showChampFinal = !isNations();
  let champFinalBlock = '';
  if(showChampFinal){
    const catBlocks = champCats().map(c=> resultChampBlock(c, rchampByCat[c])).join('');
    const savedCount = champCats().filter(c=> rchampByCat[c]).length;
    const stateTag = savedCount===champCats().length ? '<span class="tag-done2">✓ saisi</span>'
                   : savedCount>0 ? '<span class="tag-partial">partiel</span>'
                   : '<span class="tag-none">à saisir</span>';
    champFinalBlock = `
      <div class="champ-final-box">
        <div class="cfb-head">🏆 Classement FINAL du championnat ${stateTag}</div>
        <p class="cfb-sub">Le podium officiel de fin de saison. C'est lui qui attribue les points des <b>pronos championnat</b>.</p>
        ${catBlocks}
        <div class="msg" id="rcmsg"></div>
        <button class="btn" id="saveResChamp">Enregistrer le classement final</button>
      </div>`;
  }

  body.innerHTML = `
    <div class="sec-title">Saisie des résultats</div>
    <p class="sec-sub">Clique sur une manche pour entrer le podium réel. Le bouton "Annuler" marque une épreuve non courue.</p>
    <label class="done-toggle">
      <input type="checkbox" id="champDone" ${termine?'checked':''}>
      <span>Championnat <b>${CHAMP_LABELS[currentChamp]||currentChamp}</b> terminé (affiche "Terminé" sur l'accueil)</span>
    </label>
    ${champFinalBlock}
    ${!isNations() ? `
    <div class="champ-deadline-box">
      <div class="cdb-head">📅 Fermeture des pronos championnat</div>
      <p class="cdb-sub">Date/heure limite pour pronostiquer le <b>podium final</b> du championnat. Après cette date, les joueurs ne peuvent plus modifier leur prono championnat.</p>
      <input type="datetime-local" id="champDeadlineInput" class="cdb-input" value="${champDeadline ? toLocalInput(champDeadline) : ''}">
      <div class="cdb-actions">
        <button class="btn" id="saveChampDeadline">Enregistrer la date</button>
        ${champDeadline ? '<button class="btn-del" id="clearChampDeadline">Retirer la deadline</button>' : ''}
      </div>
      <div class="msg" id="cdbMsg"></div>
    </div>` : ''}
    <div class="admin-manches-lbl">Résultats par manche</div>
    ${rows}
  `;
  const doneChk = document.getElementById('champDone');
  if(doneChk) doneChk.onchange = async ()=>{
    const val = doneChk.checked;
    const { error } = await sb.from('championnats_meta')
      .upsert({ championnat: currentChamp, termine: val, updated_at: new Date().toISOString() });
    if(error){ alert('Erreur : '+error.message); doneChk.checked = !val; return; }
    CHAMP_TERMINE[currentChamp] = val;
  };
  // deadline prono championnat
  const saveDeadBtn = document.getElementById('saveChampDeadline');
  if(saveDeadBtn) saveDeadBtn.onclick = async ()=>{
    const input = document.getElementById('champDeadlineInput');
    const msg = document.getElementById('cdbMsg');
    const set = (t,c)=>{ msg.textContent=t; msg.className='msg show '+c; };
    if(!input.value){ set('Choisis une date et une heure.', 'err'); return; }
    const iso = new Date(input.value).toISOString();
    const { error } = await sb.from('config_champ')
      .upsert({ championnat: currentChamp, champ_closes_at: iso }, { onConflict:'championnat' });
    if(error){ set('Erreur : '+error.message, 'err'); return; }
    CHAMP_CLOSES_AT = iso; CHAMP_CLOSES_LOADED_FOR = currentChamp;
    set('✓ Date de fermeture enregistrée !', 'ok');
  };
  const clearDeadBtn = document.getElementById('clearChampDeadline');
  if(clearDeadBtn) clearDeadBtn.onclick = async ()=>{
    if(!confirm('Retirer la deadline ? Les pronos championnat resteront ouverts (sauf si le championnat est marqué terminé).')) return;
    const { error } = await sb.from('config_champ')
      .upsert({ championnat: currentChamp, champ_closes_at: null }, { onConflict:'championnat' });
    if(error){ alert('Erreur : '+error.message); return; }
    CHAMP_CLOSES_AT = null; CHAMP_CLOSES_LOADED_FOR = currentChamp;
    renderAdminResultats(body);
  };
  body.querySelectorAll('.admin-row:not([disabled])').forEach(b=>{
    b.onclick = ()=> openResultEntry(+b.dataset.manche, manches.find(m=>m.id==b.dataset.manche));
  });
  body.querySelectorAll('.annul-btn').forEach(b=>{
    b.onclick = async ()=>{
      const id = +b.dataset.annul;
      const nouvelEtat = b.dataset.etat==='1' ? false : true;
      const m = manches.find(x=>x.id===id);
      const msg = nouvelEtat
        ? `Marquer "${m.nom}" comme ANNULÉE ? Elle ne comptera pas dans les classements.`
        : `Réactiver "${m.nom}" ?`;
      if(!confirm(msg)) return;
      await sb.from('manches').update({ annulee: nouvelEtat }).eq('id', id);
      renderAdminResultats(body);
    };
  });
  // ouvrir / fermer manuellement les pronos d'une manche
  body.querySelectorAll('.open-btn').forEach(b=>{
    b.onclick = async ()=>{
      const id = +b.dataset.openclose;
      const m = manches.find(x=>x.id===id);
      if(isClosed(m)){
        // ROUVRIR : force_open = true, on lève le flag "terminée"
        if(!confirm(`Rouvrir les pronos de "${m.nom}" ? Les joueurs pourront à nouveau pronostiquer.`)) return;
        const { error } = await sb.from('manches').update({ force_open:true, terminee:false }).eq('id', id);
        if(error){ alert('Erreur : '+error.message); return; }
      } else {
        // FERMER : terminée = true, on retire le force_open
        if(!confirm(`Fermer les pronos de "${m.nom}" maintenant ? Les joueurs ne pourront plus pronostiquer.`)) return;
        const { error } = await sb.from('manches').update({ terminee:true, force_open:false }).eq('id', id);
        if(error){ alert('Erreur : '+error.message); return; }
      }
      renderAdminResultats(body);
    };
  });
  // classement final championnat
  if(showChampFinal){
    champCats().forEach(c=> setupResultChamp(c));
    const sc = document.getElementById('saveResChamp');
    if(sc) sc.onclick = ()=> saveResultChamp(body);
  }
}

function resultChampBlock(cat, existing){
  const pilotes = pilotesForCat(cat);
  const e = existing||{};
  const opt = (selId)=> '<option value="">—</option>' + pilotes.map(p=>
    `<option value="${p.id}" ${selId==p.id?'selected':''}>#${p.numero||'?'} ${p.nom}</option>`).join('');
  return `
    <div class="podium reschamp" data-cat="${cat}">
      <div class="podium-head"><span class="cat-tag ${catClass(cat)}">${catLabel(cat)}</span> Podium final</div>
      <div class="pod-row"><label>1<sup>er</sup></label><select data-pos="p1">${opt(e.p1_pilote_id)}</select></div>
      <div class="pod-row"><label>2<sup>e</sup></label><select data-pos="p2">${opt(e.p2_pilote_id)}</select></div>
      <div class="pod-row"><label>3<sup>e</sup></label><select data-pos="p3">${opt(e.p3_pilote_id)}</select></div>
      <div class="pod-row"><label>5<sup>e</sup></label><select data-pos="p5">${opt(e.p5_pilote_id)}</select></div>
    </div>
  `;
}

function setupResultChamp(cat){
  const block = document.querySelector(`.podium.reschamp[data-cat="${cat}"]`);
  if(!block) return;
  const selects = [...block.querySelectorAll('select[data-pos]')];
  const refresh = ()=>{
    const chosen = selects.map(s=>s.value).filter(Boolean);
    selects.forEach(s=>{
      [...s.options].forEach(o=>{
        if(!o.value) return;
        o.disabled = chosen.includes(o.value) && s.value !== o.value;
      });
    });
  };
  selects.forEach(s=> s.onchange = refresh);
  refresh();
}

async function saveResultChamp(body){
  const rows = [];
  for(const cat of champCats()){
    const block = document.querySelector(`.podium.reschamp[data-cat="${cat}"]`);
    if(!block) continue;
    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;
    const p1=get('p1'), p2=get('p2'), p3=get('p3'), p5=get('p5');
    if(p1||p2||p3||p5){
      if(!(p1&&p2&&p3)) return showRCMsg(`Complète au moins le podium ${cat} (1er, 2e, 3e).`, 'err');
      rows.push({ championnat: currentChamp, categorie: cat,
        p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, updated_at:new Date().toISOString() });
    }
  }
  if(!rows.length) return showRCMsg("Saisis au moins un podium final.", 'err');
  showRCMsg("Enregistrement…", 'ok');
  const { error } = await sb.from('resultat_championnat').upsert(rows, { onConflict:'championnat,categorie' });
  if(error) return showRCMsg(error.message, 'err');
  showRCMsg("✓ Classement final enregistré ! Les points des pronos championnat sont attribués.", 'ok');
  setTimeout(()=> renderAdminResultats(body), 1400);
}

function showRCMsg(t,type){ const m=document.getElementById('rcmsg'); if(m){ m.textContent=t; m.className='msg show '+type; } }

// ====== ADMIN · PILOTES (ajouter / modifier) ======
// Familles US (AMA/SXUS/SMX) : système "fiche unique + listes" (cases à cocher)
// Autres (MXGP/Vendée/MXdN) : ancien système inchangé

// définition des listes cochables pour la famille US
const US_LISTES = [
  { champ:'AMA',  label:'MX US',  ico:'🇺🇸', cats:['450','250'] },
  { champ:'SXUS', label:'SX US',  ico:'🏟️', cats:['450','250 West','250 East'] },
  { champ:'SMX',  label:'SMX',    ico:'⭐',  cats:['450','250'] },
];

async function renderAdminPilotes(body){
  if(CHAMPS_LISTES.includes(currentChamp)){
    return renderAdminPilotesUS(body);
  }
  return renderAdminPilotesClassic(body);
}

// ---- Nouveau : admin pilotes famille US ----
async function renderAdminPilotesUS(body){
  body.innerHTML = `<div class="loading">Chargement…</div>`;
  const [{ data: liens }, { data: fiches }, { data: propos }] = await Promise.all([
    sb.from('pilotes_listes').select('pilote_id, championnat, categorie'),
    sb.from('pilotes').select('id, nom, numero, valide').eq('championnat','AMA').eq('valide', true),
    sb.from('pilotes').select('id, nom, numero, categorie, championnat')
      .in('championnat', CHAMPS_LISTES).eq('valide', false)
  ]);
  const liensByPilote = {};
  (liens||[]).forEach(l=>{ (liensByPilote[l.pilote_id] = liensByPilote[l.pilote_id]||[]).push(l); });
  const ficheById = {}; (fiches||[]).forEach(f=> ficheById[f.id]=f);

  const badgesFor = (pid)=> (liensByPilote[pid]||[]).map(l=>{
    const lab = l.championnat==='AMA'?'MX':l.championnat==='SXUS'?'SX':'SMX';
    return `<span class="cat-tag ${catClass(l.categorie)}" style="font-size:9px">${lab} ${l.categorie.replace('250 ','')}</span>`;
  }).join('');

  // bloc propositions (pilotes non validés de la famille US)
  const proposBlock = (propos && propos.length) ? `
    <div class="propos-zone">
      <div class="sec-title" style="font-size:15px;color:var(--cyan)">⏳ Propositions à valider (${propos.length})</div>
      ${propos.map(p=>`
        <div class="propos-row">
          <span class="propos-info"><b>${p.numero!=null?`#${p.numero} `:''}${(p.nom||'').replace(/</g,'&lt;')}</b>
            <span class="cat-mini ${catClass(p.categorie)}">${CHAMP_LABELS[p.championnat]||p.championnat} · ${p.categorie}</span></span>
          <span class="propos-actions">
            <button class="propos-ok" data-id="${p.id}">Valider</button>
            <button class="propos-no" data-id="${p.id}">Rejeter</button>
          </span>
        </div>`).join('')}
    </div>` : '';

  // grouper par catégorie DU CHAMPIONNAT COURANT, trier par numéro
  const catsCourant = cats(); // ex SX : ['450','250 West','250 East','250']
  const sections = catsCourant.map(cat=>{
    // pilotes ayant une liaison sur (currentChamp, cat)  — pour "250" (showdown) on réunit West+East
    let pilotesCat;
    if(cat==='250' && currentChamp==='SXUS'){
      const ids = new Set((liens||[]).filter(l=>l.championnat==='SXUS' && (l.categorie==='250 West'||l.categorie==='250 East')).map(l=>l.pilote_id));
      pilotesCat = [...ids].map(id=>ficheById[id]).filter(Boolean);
    } else {
      const ids = (liens||[]).filter(l=>l.championnat===currentChamp && l.categorie===cat).map(l=>l.pilote_id);
      pilotesCat = ids.map(id=>ficheById[id]).filter(Boolean);
    }
    pilotesCat.sort((a,b)=> (a.numero||999)-(b.numero||999));
    if(!pilotesCat.length && cat==='250' && currentChamp==='SXUS') return ''; // pas de section showdown vide
    return `
      <div class="pil-cat"><span class="cat-tag ${catClass(cat)}">${catLabel(cat)}</span> ${pilotesCat.length} pilote${pilotesCat.length>1?'s':''}</div>
      <div class="pil-us-list">
        ${pilotesCat.map(p=>`
          <button class="pil-us-row" data-id="${p.id}">
            <span class="pil-us-num">${p.numero!=null?'#'+p.numero:'—'}</span>
            <span class="pil-us-nom">${(p.nom||'').replace(/</g,'&lt;')}</span>
            <span class="pil-us-badges">${badgesFor(p.id)}</span>
            <span class="pil-us-edit">✎</span>
          </button>`).join('')}
      </div>`;
  }).join('');

  body.innerHTML = `
    <div class="sec-title">Gestion des pilotes · ${CHAMP_LABELS[currentChamp]}</div>
    <p class="sec-sub">Clique sur un pilote pour choisir ses listes. Le pilote est partagé entre MX US, SX US et SMX.</p>
    ${proposBlock}
    <button class="btn" id="addPiloteUS">+ Ajouter un pilote</button>
    ${sections}
    <div id="pilModalHost"></div>
  `;

  // valider une proposition : ouvre la modale à cocher, pré-cochée sur la liste proposée
  body.querySelectorAll('.propos-ok').forEach(btn=>{
    btn.onclick = ()=>{
      const p = (propos||[]).find(x=>x.id===+btn.dataset.id);
      if(!p) return;
      // liaison pré-cochée = là où il a été proposé
      const preLiens = [{ championnat:p.championnat, categorie:p.categorie }];
      openPiloteEditor(null, preLiens, { nom:p.nom, numero:p.numero }, body, p.id);
    };
  });
  // rejeter une proposition
  body.querySelectorAll('.propos-no').forEach(btn=>{
    btn.onclick = async ()=>{
      if(!confirm('Rejeter cette proposition ?')) return;
      await sb.from('pilotes').delete().eq('id', +btn.dataset.id);
      renderAdminPilotesUS(body);
    };
  });

  body.querySelectorAll('.pil-us-row').forEach(btn=>{
    btn.onclick = ()=> openPiloteEditor(+btn.dataset.id, liensByPilote[+btn.dataset.id]||[], ficheById[+btn.dataset.id], body);
  });
  document.getElementById('addPiloteUS').onclick = ()=> openPiloteEditor(null, [], null, body);
}

// éditeur d'un pilote — MODALE centrée
// proposId : si fourni, on valide une proposition (on supprimera la ligne proposée après création de la fiche)
function openPiloteEditor(pid, liens, fiche, body, proposId){
  const host = document.getElementById('pilModalHost') || body;
  const has = (champ,cat)=> liens.some(l=>l.championnat===champ && l.categorie===cat);
  const num = fiche ? (fiche.numero??'') : '';
  const nom = fiche ? (fiche.nom||'') : '';

  const overlay = document.createElement('div');
  overlay.className = 'pil-modal-overlay';
  overlay.innerHTML = `
    <div class="pil-modal">
      <button class="pm-close" id="pmClose">✕</button>
      <div class="pe-title">${pid?'Modifier':'Ajouter'} un pilote</div>
      <div class="pe-ident">
        <div class="pe-field pe-num"><label>Numéro</label><input id="peNum" type="number" value="${num}" placeholder="#"></div>
        <div class="pe-field pe-nom"><label>Nom</label><input id="peNom" type="text" value="${String(nom).replace(/"/g,'&quot;')}" placeholder="Nom complet"></div>
      </div>
      <div class="pe-lbl">Dans quelles listes roule-t-il ?</div>
      ${US_LISTES.map(g=>`
        <div class="pe-grp">
          <div class="pe-grp-title">${g.ico} ${g.label}</div>
          <div class="pe-checks">
            ${g.cats.map(c=>`
              <label class="pe-check ${has(g.champ,c)?'on':''}">
                <input type="checkbox" data-champ="${g.champ}" data-cat="${c}" ${has(g.champ,c)?'checked':''}>
                ${c}
              </label>`).join('')}
          </div>
        </div>`).join('')}
      <div class="pe-actions">
        <button class="pe-save" id="peSave">Enregistrer</button>
        ${pid?'<button class="pe-del" id="peDel">Supprimer</button>':''}
      </div>
      <div class="msg" id="peMsg"></div>
    </div>`;
  host.appendChild(overlay);
  document.body.style.overflow = 'hidden';

  const close = ()=>{ overlay.remove(); document.body.style.overflow=''; };
  overlay.onclick = (e)=>{ if(e.target===overlay) close(); };
  document.getElementById('pmClose').onclick = close;

  overlay.querySelectorAll('.pe-check input').forEach(inp=>{
    inp.onchange = ()=> inp.closest('.pe-check').classList.toggle('on', inp.checked);
  });

  const peMsg = (t,type)=>{ const m=document.getElementById('peMsg'); if(m){ m.textContent=t; m.className='msg show '+type; } };

  document.getElementById('peSave').onclick = async ()=>{
    const numero = document.getElementById('peNum').value || null;
    const nomV = document.getElementById('peNom').value.trim();
    if(!nomV) return peMsg('Le nom ne peut pas être vide.', 'err');
    const checked = [...overlay.querySelectorAll('.pe-check input:checked')]
      .map(i=>({ championnat:i.dataset.champ, categorie:i.dataset.cat }));

    let id = pid;
    if(!id){
      const refCat = checked.find(c=>c.championnat==='AMA')?.categorie || '250';
      const { data, error } = await sb.from('pilotes')
        .insert({ nom:nomV, numero, categorie:refCat, valide:true, championnat:'AMA' })
        .select('id').single();
      if(error) return peMsg(error.message, 'err');
      id = data.id;
    } else {
      const { error } = await sb.from('pilotes').update({ nom:nomV, numero }).eq('id', id);
      if(error) return peMsg(error.message, 'err');
    }
    await sb.from('pilotes_listes').delete().eq('pilote_id', id);
    if(checked.length){
      const rows = checked.map(c=>({ pilote_id:id, championnat:c.championnat, categorie:c.categorie }));
      const { error } = await sb.from('pilotes_listes').insert(rows);
      if(error) return peMsg(error.message, 'err');
    }
    // si on validait une proposition, supprimer la ligne proposée d'origine
    if(proposId && proposId!==id){
      await sb.from('pilotes').delete().eq('id', proposId);
    }
    PILOTES = {};
    close();
    renderAdminPilotesUS(body);
  };

  const del = document.getElementById('peDel');
  if(del) del.onclick = async ()=>{
    if(!confirm('Supprimer ce pilote et toutes ses listes ?')) return;
    await sb.from('pilotes_listes').delete().eq('pilote_id', pid);
    const { error } = await sb.from('pilotes').delete().eq('id', pid);
    if(error) return peMsg(error.message, 'err');
    PILOTES = {};
    close();
    renderAdminPilotesUS(body);
  };
}

          <span class="propos-actions">

    <div class="pil-add">
      <div class="sec-title" style="font-size:15px">Ajouter ${nat?'un pays':'un pilote'}</div>
      <div class="pil-addrow">
        ${nat?'':`<input id="newNum" type="number" placeholder="#" class="pil-num">`}
        <input id="newNom" type="text" placeholder="${nat?'Pays (ex. Italie)':'Nom complet'}" class="pil-nom">
        <select id="newCat" class="pil-cat-sel">${cats().map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
      </div>
      <button class="btn" id="addPilote">Ajouter ${nat?'ce pays':'ce pilote'}</button>
    </div>
    <div class="msg" id="pilmsg"></div>
  `;

  body.querySelectorAll('.propos-ok').forEach(btn=>{
    btn.onclick = async ()=>{
      const { error } = await sb.from('pilotes').update({ valide:true }).eq('id', +btn.dataset.id);
      if(error) return showPilMsg(error.message,'err');
      PILOTES={}; renderAdminPilotesClassic(body);
    };
  });
  body.querySelectorAll('.propos-no').forEach(btn=>{
    btn.onclick = async ()=>{
      const { error } = await sb.from('pilotes').delete().eq('id', +btn.dataset.id);
      if(error) return showPilMsg(error.message,'err');
      renderAdminPilotesClassic(body);
    };
  });

  body.querySelectorAll('.pil-save').forEach(btn=>{
    btn.onclick = async ()=>{
      const row = btn.closest('.pil-row');
      const id = +btn.dataset.id;
      const numEl = row.querySelector('[data-f="numero"]');
      const numero = numEl ? (numEl.value || null) : null;
      const nom = row.querySelector('[data-f="nom"]').value.trim();
      if(!nom) return showPilMsg("Le nom ne peut pas être vide.", 'err');
      const { error } = await sb.from('pilotes').update({ numero, nom }).eq('id', id);
      if(error) return showPilMsg(error.message, 'err');
      showPilMsg(nat?"✓ Nation modifiée.":"✓ Pilote modifié.", 'ok');
      PILOTES = {};
    };
  });

  document.getElementById('addPilote').onclick = async ()=>{
    const numEl = document.getElementById('newNum');
    const numero = numEl ? (numEl.value || null) : null;
    const nom = document.getElementById('newNom').value.trim();
    const categorie = document.getElementById('newCat').value;
    if(!nom) return showPilMsg(nat?"Entre le nom du pays.":"Entre le nom du pilote.", 'err');
    const { error } = await sb.from('pilotes').insert({ numero, nom, categorie, valide:true, championnat: currentChamp });
    if(error){
      if(error.message.includes('duplicate')||error.message.includes('unique'))
        return showPilMsg(nat?"Ce pays existe déjà.":"Ce pilote existe déjà dans cette catégorie.", 'err');
      return showPilMsg(error.message, 'err');
    }
    PILOTES = {};
    renderAdminPilotesClassic(body);
  };
}

function showPilMsg(t,type){ const m=document.getElementById('pilmsg'); if(m){ m.textContent=t; m.className='msg show '+type; } }

// ----- écran de saisie d'un résultat -----
async function openResultEntry(mancheId, manche){
  const v = document.getElementById('view');
  v.innerHTML = `<div class="card"><div class="loading">Chargement…</div></div>`;

  const { data: existing } = await sb.from('resultats').select('*').eq('manche_id', mancheId);
  const byCat = {}; (existing||[]).forEach(r=> byCat[r.categorie]=r);

  v.innerHTML = `
    <div class="card">
      <button class="back" id="back">← Retour à la liste</button>
      <div class="sec-title">${manche.nom} — résultats</div>
      <p class="sec-sub">${frDate(manche.date_course)} · saisis le podium réel de chaque catégorie</p>
      ${mancheCats(manche).map(c=> resultBlock(c, byCat[c])).join('')}
      <div class="msg" id="rmsg"></div>
      <button class="btn" id="saveRes">Enregistrer les résultats</button>
    </div>
  `;
  document.getElementById('back').onclick = ()=>{ switchView('admin'); };
  mancheCats(manche).forEach(c=>setupResult(c));
  document.getElementById('saveRes').onclick = ()=>saveResult(mancheId, manche);
}

function resultBlock(cat, existing){
  const nat = isNations();
  const pilotes = pilotesForCat(cat);
  const e = existing||{};
  const opt = (selId)=> '<option value="">—</option>' + pilotes.map(p=>
    `<option value="${p.id}" ${selId==p.id?'selected':''}>${nat ? p.nom : `#${p.numero||'?'} ${p.nom}`}</option>`).join('');
  const tag = nat ? '<span class="cat-tag cat-nations">🏆 Nations</span>' : `<span class="cat-tag ${catClass(cat)}">${catLabel(cat)}</span>`;
  return `
    <div class="podium result" data-cat="${cat}">
      <div class="podium-head">${tag} Podium réel</div>
      <div class="pod-row"><label>1<sup>er</sup></label><select data-pos="p1">${opt(e.p1_pilote_id)}</select></div>
      <div class="pod-row"><label>2<sup>e</sup></label><select data-pos="p2">${opt(e.p2_pilote_id)}</select></div>
      <div class="pod-row"><label>3<sup>e</sup></label><select data-pos="p3">${opt(e.p3_pilote_id)}</select></div>
      <div class="pod-row"><label>5<sup>e</sup></label><select data-pos="p5">${opt(e.p5_pilote_id)}</select></div>
    </div>
  `;
}

function setupResult(cat){
  const block = document.querySelector(`.podium.result[data-cat="${cat}"]`);
  const selects = [...block.querySelectorAll('select[data-pos]')];
  const refresh = ()=>{
    const chosen = selects.map(s=>s.value).filter(Boolean);
    selects.forEach(s=>{
      [...s.options].forEach(o=>{
        if(!o.value) return;
        o.disabled = chosen.includes(o.value) && s.value !== o.value;
      });
    });
  };
  selects.forEach(s=> s.onchange = refresh);
  refresh();
}

async function saveResult(mancheId, manche){
  const rows = [];
  for(const cat of mancheCats(manche)){
    const block = document.querySelector(`.podium.result[data-cat="${cat}"]`);
    const get = pos => block.querySelector(`select[data-pos="${pos}"]`).value || null;
    const p1=get('p1'), p2=get('p2'), p3=get('p3'), p5=get('p5');
    if(p1||p2||p3||p5){
      if(!(p1&&p2&&p3)) return showRMsg(`Complète au moins le podium ${cat} (1er, 2e, 3e).`, 'err');
      rows.push({ manche_id:mancheId, categorie:cat,
        p1_pilote_id:p1, p2_pilote_id:p2, p3_pilote_id:p3, p5_pilote_id:p5, updated_at:new Date().toISOString() });
    }
  }
  if(!rows.length) return showRMsg("Saisis au moins un podium.", 'err');

  showRMsg("Enregistrement…", 'ok');
  const { error } = await sb.from('resultats').upsert(rows, { onConflict:'manche_id,categorie' });
  if(error) return showRMsg(error.message, 'err');
  // marquer la manche comme terminée
  await sb.from('manches').update({ terminee:true }).eq('id', mancheId);
  showRMsg("✓ Résultats enregistrés ! (le calcul des points arrivera au prochain bloc)", 'ok');
}

function showRMsg(t,type){ const m=document.getElementById('rmsg'); if(m){ m.textContent=t; m.className='msg show '+type; } }

// ====== CHAT DU CLUB ======
let chatInited = false;
let chatChannel = null;
let chatOpen = false;
let chatUnread = 0;
let chatSeenIds = new Set();
let chatLastMsgId = 0;          // id du message le plus récent affiché
let chatMembers = [];          // pseudos pour l'autocomplétion des mentions
let chatReads = {};            // user_id -> last_read_id (accusés de lecture des autres)
let chatTotalMembers = 0;      // nb total de joueurs (pour "vu par tous")

function chatLastReadKey(){
  const uid = currentSession ? currentSession.user.id : 'anon';
  return 'chat_last_read_' + uid;
}
function getChatLastRead(){
  try { return parseInt(localStorage.getItem(chatLastReadKey())) || 0; } catch(e){ return 0; }
}
function setChatLastRead(id){
  try { localStorage.setItem(chatLastReadKey(), String(id)); } catch(e){}
  // enregistre aussi en base pour les accusés de lecture des autres
  if(currentSession && id>0){
    const uid = currentSession.user.id;
    chatReads[uid] = Math.max(chatReads[uid]||0, id);
    sb.from('chat_reads').upsert({ user_id: uid, last_read_id: chatReads[uid], updated_at: new Date().toISOString() }, { onConflict:'user_id' })
      .then(()=>{}, ()=>{});
  }
}
function myPseudo(){
  return (currentProfil && currentProfil.pseudo) || 'Joueur';
}
function mentionsMe(txt){
  const me = myPseudo().toLowerCase();
  if(!me) return false;
  return new RegExp('@'+me.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(txt||'');
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// surligne les @pseudo connus dans un message déjà échappé
function highlightMentions(safeText){
  if(!chatMembers.length) return safeText;
  const me = myPseudo().toLowerCase();
  // trie par longueur décroissante pour matcher les pseudos longs d'abord
  const names = chatMembers.slice().sort((a,b)=> b.length-a.length);
  let out = safeText;
  names.forEach(name=>{
    const safeName = escapeHtml(name);
    const re = new RegExp('@'+safeName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','gi');
    const cls = (name.toLowerCase()===me) ? 'cm-mention me' : 'cm-mention';
    out = out.replace(re, m=>`<span class="${cls}">${m}</span>`);
  });
  return out;
}
function chatTime(iso){
  const d=new Date(iso);
  return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}
function colorFromName(name){
  let h=0; for(let i=0;i<(name||'').length;i++) h=(h*31+name.charCodeAt(i))%360;
  return `hsl(${h},60%,68%)`;
}

// avatars thème motocross
const MOTO_AVATARS = ['🏍️','🏁','🥇','🏆','🐺','🔧','⚙️','💨','🔥','⚡','🎯','👑','💪','🥷','🦊','🦅'];
// cache des avatars par user_id (rempli par les vues)
let AVATARS = {};
// renvoie le HTML du contenu d'un avatar : emoji si choisi, sinon initiale
function avatarInner(uid, pseudo){
  const av = AVATARS[uid];
  if(av) return `<span class="av-emoji">${av}</span>`;
  return (pseudo||'?').trim().charAt(0).toUpperCase()||'?';
}
function avatarBg(uid, pseudo){
  // si emoji, fond neutre sombre ; sinon couleur dérivée du pseudo
  return AVATARS[uid] ? 'var(--night2)' : colorFromName(pseudo);
}

function initChat(){
  if(chatInited) return;
  chatInited = true;

  // bouton flottant
  const fab=document.createElement('button');
  fab.id='chatFab';
  fab.innerHTML=`💬<span class="chat-badge" id="chatBadge"></span>`;
  document.body.appendChild(fab);

  // panneau
  const panel=document.createElement('div');
  panel.id='chatPanel';
  panel.innerHTML=`
    <div class="chat-head">
      <span class="ch-dot"></span>
      <span class="ch-title">Chat du club</span>
      <button class="ch-close" id="chatClose">×</button>
    </div>
    <div class="chat-body" id="chatBody"><div class="chat-empty">Chargement des messages…</div></div>
    <div class="chat-mentions" id="chatMentions"></div>
    <div class="chat-foot">
      <input id="chatInput" type="text" maxlength="500" placeholder="Écris un message…  (@ pour mentionner)" autocomplete="off">
      <button id="chatSend" title="Envoyer">➤</button>
    </div>`;
  document.body.appendChild(panel);

  fab.onclick = ()=> toggleChat();
  document.getElementById('chatClose').onclick = ()=> toggleChat(false);
  const input=document.getElementById('chatInput');
  const sendBtn=document.getElementById('chatSend');
  sendBtn.onclick = sendChatMessage;
  input.onkeydown = e=>{
    const menu=document.getElementById('chatMentions');
    if(menu && menu.classList.contains('show')){
      // navigation simple dans le menu
      const items=[...menu.querySelectorAll('.cm-mention-item')];
      const cur=menu.querySelector('.cm-mention-item.hl');
      if(e.key==='ArrowDown'||e.key==='ArrowUp'){
        e.preventDefault();
        let idx=items.indexOf(cur);
        idx = e.key==='ArrowDown' ? Math.min(items.length-1, idx+1) : Math.max(0, idx-1);
        items.forEach(x=>x.classList.remove('hl')); if(items[idx]) items[idx].classList.add('hl');
        return;
      }
      if(e.key==='Enter' || e.key==='Tab'){
        if(cur){ e.preventDefault(); applyMention(cur.dataset.pseudo); return; }
      }
      if(e.key==='Escape'){ hideMentionMenu(); return; }
    }
    if(e.key==='Enter'){ e.preventDefault(); sendChatMessage(); }
  };
  input.oninput = ()=> handleMentionTyping();

  loadChatMembers();
  loadChatMessages();
  subscribeChat();
}

async function loadChatMembers(){
  const { data } = await sb.from('profils').select('id,pseudo,avatar');
  chatMembers = (data||[]).map(p=>p.pseudo).filter(Boolean);
  (data||[]).forEach(p=>{ if(p.avatar) AVATARS[p.id]=p.avatar; });
  chatTotalMembers = chatMembers.length;
  // charger les accusés de lecture
  const { data: reads } = await sb.from('chat_reads').select('user_id,last_read_id');
  chatReads = {};
  (reads||[]).forEach(r=> chatReads[r.user_id]=r.last_read_id);
}

// calcule "Vu par X" pour mon dernier message envoyé
function updateReadReceipt(){
  const body=document.getElementById('chatBody');
  if(!body || !currentSession) return;
  const myUid=currentSession.user.id;
  // retire l'ancien reçu
  const old=body.querySelector('.cm-receipt'); if(old) old.remove();
  // trouve mon dernier message (le plus bas)
  const mineEls=[...body.querySelectorAll('.cmsg.mine')];
  if(!mineEls.length) return;
  const lastMine=mineEls[mineEls.length-1];
  const lastMineId=parseInt(lastMine.dataset.id);
  if(!lastMineId) return;
  // compte les AUTRES qui ont lu jusqu'à ce message
  let n=0;
  Object.entries(chatReads).forEach(([uid,rid])=>{
    if(uid!==myUid && rid>=lastMineId) n++;
  });
  if(n>0){
    const r=document.createElement('div');
    r.className='cm-receipt';
    const others=chatTotalMembers-1;
    r.textContent = (others>0 && n>=others) ? '👁 Vu par tous' : `👁 Vu par ${n}`;
    lastMine.appendChild(r);
  }
}

// ----- autocomplétion des mentions -----
function handleMentionTyping(){
  const input=document.getElementById('chatInput');
  const menu=document.getElementById('chatMentions');
  if(!input||!menu) return;
  const val=input.value;
  const pos=input.selectionStart;
  const upto=val.slice(0,pos);
  const m=upto.match(/@([\p{L}0-9_]*)$/u);  // @ suivi du début d'un pseudo
  if(!m){ hideMentionMenu(); return; }
  const q=m[1].toLowerCase();
  const matches=chatMembers
    .filter(p=> p.toLowerCase()!==myPseudo().toLowerCase())
    .filter(p=> p.toLowerCase().startsWith(q))
    .slice(0,5);
  if(!matches.length){ hideMentionMenu(); return; }
  menu.innerHTML=matches.map((p,i)=>`<button class="cm-mention-item${i===0?' hl':''}" data-pseudo="${escapeHtml(p)}">@${escapeHtml(p)}</button>`).join('');
  menu.classList.add('show');
  menu.querySelectorAll('.cm-mention-item').forEach(b=>{
    b.onclick=()=> applyMention(b.dataset.pseudo);
  });
}
function applyMention(pseudo){
  const input=document.getElementById('chatInput');
  if(!input) return;
  const val=input.value; const pos=input.selectionStart;
  const upto=val.slice(0,pos);
  const rest=val.slice(pos);
  const newUpto=upto.replace(/@([\p{L}0-9_]*)$/u, '@'+pseudo+' ');
  input.value=newUpto+rest;
  const np=newUpto.length;
  input.setSelectionRange(np,np);
  hideMentionMenu(); input.focus();
}
function hideMentionMenu(){
  const menu=document.getElementById('chatMentions');
  if(menu){ menu.classList.remove('show'); menu.innerHTML=''; }
}

async function loadChatMessages(){
  const body=document.getElementById('chatBody');
  if(!body) return;
  const { data, error } = await sb.from('chat_messages')
    .select('*').order('created_at',{ascending:false}).limit(100);
  if(error){ body.innerHTML=`<div class="chat-empty">Impossible de charger le chat.</div>`; return; }
  const msgs=(data||[]).reverse();
  body.innerHTML = msgs.length ? '' : `<div class="chat-empty">Aucun message pour le moment.<br>Lance la discussion ! 🐺</div>`;
  msgs.forEach(m=>{ chatSeenIds.add(m.id); chatLastMsgId=Math.max(chatLastMsgId, m.id); body.appendChild(renderChatMsg(m)); });
  // compteur non-lus persistant : messages des autres plus récents que le dernier lu
  const lastRead = getChatLastRead();
  chatUnread = msgs.filter(m=> m.id>lastRead && !(currentSession && m.user_id===currentSession.user.id)).length;
  updateChatBadge();
  // s'il y a une mention de moi non lue, faire pulser
  if(msgs.some(m=> m.id>lastRead && mentionsMe(m.contenu) && !(currentSession && m.user_id===currentSession.user.id)))
    pulseChatFab();
  updateReadReceipt();
  body.scrollTop = body.scrollHeight;
}

function renderChatMsg(m){
  const mine = currentSession && m.user_id===currentSession.user.id;
  const el=document.createElement('div');
  el.className='cmsg'+(mine?' mine':'')+(mentionsMe(m.contenu)&&!mine?' mentioned':'');
  el.dataset.id=m.id;
  const contenu = highlightMentions(escapeHtml(m.contenu));
  el.innerHTML=`
    <div class="cm-meta">
      ${mine?'':`<span class="cm-avatar" style="background:${avatarBg(m.user_id, m.pseudo)}">${avatarInner(m.user_id, m.pseudo)}</span><span class="cm-pseudo" style="color:${colorFromName(m.pseudo)}">${escapeHtml(m.pseudo)}</span>`}
      <span class="cm-time">${chatTime(m.created_at)}</span>
    </div>
    <div class="cm-bubble">${contenu}</div>
    ${mine
      ? `<button class="cm-del" data-del="${m.id}">supprimer</button>`
      : `<button class="cm-reply" data-pseudo="${escapeHtml(m.pseudo)}">↩ Répondre</button>`}`;
  if(mine){
    el.querySelector('.cm-del').onclick = async ()=>{
      await sb.from('chat_messages').delete().eq('id', m.id);
      el.remove();
    };
  } else {
    el.querySelector('.cm-reply').onclick = ()=> replyTo(m.pseudo);
  }
  return el;
}

// insère @pseudo dans le champ et donne le focus
function replyTo(pseudo){
  const input=document.getElementById('chatInput');
  if(!input) return;
  const mention='@'+pseudo+' ';
  // évite de doubler si déjà présent au début
  if(!input.value.startsWith(mention)){
    input.value = mention + input.value.replace(new RegExp('^@'+pseudo.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*'),'');
  }
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
}

function subscribeChat(){
  if(chatChannel) return;
  chatChannel = sb.channel('chat_club')
    .on('postgres_changes',
      { event:'INSERT', schema:'public', table:'chat_messages' },
      payload=>{
        const m=payload.new;
        if(chatSeenIds.has(m.id)) return;
        chatSeenIds.add(m.id);
        chatLastMsgId=Math.max(chatLastMsgId, m.id);
        const body=document.getElementById('chatBody');
        if(!body) return;
        const empty=body.querySelector('.chat-empty'); if(empty) empty.remove();
        const nearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 80;
        body.appendChild(renderChatMsg(m));
        if(nearBottom || (currentSession && m.user_id===currentSession.user.id))
          body.scrollTop=body.scrollHeight;
        const fromOther = !(currentSession && m.user_id===currentSession.user.id);
        if(chatOpen){
          // lu immédiatement
          setChatLastRead(chatLastMsgId);
        } else if(fromOther){
          chatUnread++; updateChatBadge();
          if(mentionsMe(m.contenu)) pulseChatFab();
        }
        updateReadReceipt();
      })
    .on('postgres_changes',
      { event:'DELETE', schema:'public', table:'chat_messages' },
      payload=>{
        const body=document.getElementById('chatBody'); if(!body) return;
        const el=body.querySelector(`.cmsg[data-id="${payload.old.id}"]`);
        if(el) el.remove();
        updateReadReceipt();
      })
    .on('postgres_changes',
      { event:'*', schema:'public', table:'chat_reads' },
      payload=>{
        const r=payload.new || payload.old;
        if(r && r.user_id){ chatReads[r.user_id]=r.last_read_id; updateReadReceipt(); }
      })
    .subscribe();
}

function toggleChat(force){
  const panel=document.getElementById('chatPanel');
  chatOpen = (force===undefined) ? !chatOpen : force;
  panel.classList.toggle('open', chatOpen);
  if(chatOpen){
    chatUnread=0; updateChatBadge();
    setChatLastRead(chatLastMsgId);   // persiste : tout est lu
    stopPulseChatFab();
    const body=document.getElementById('chatBody');
    if(body) body.scrollTop=body.scrollHeight;
    setTimeout(()=>{ const i=document.getElementById('chatInput'); if(i) i.focus(); }, 50);
  } else {
    hideMentionMenu();
  }
}

function pulseChatFab(){ const f=document.getElementById('chatFab'); if(f) f.classList.add('pulse'); }
function stopPulseChatFab(){ const f=document.getElementById('chatFab'); if(f) f.classList.remove('pulse'); }

function updateChatBadge(){
  const b=document.getElementById('chatBadge');
  if(!b) return;
  if(chatUnread>0){ b.textContent = chatUnread>99?'99+':chatUnread; b.classList.add('show'); }
  else b.classList.remove('show');
}

let lastChatSent = '';
async function sendChatMessage(){
  const input=document.getElementById('chatInput');
  const btn=document.getElementById('chatSend');
  if(!input || !currentSession) return;
  const txt = input.value.trim();
  if(!txt) return;
  if(txt === lastChatSent){ input.value=''; return; } // anti double-message
  btn.disabled=true;
  const { error } = await sb.from('chat_messages').insert({
    user_id: currentSession.user.id,
    pseudo: (currentProfil && currentProfil.pseudo) || 'Joueur',
    contenu: txt.slice(0,500)
  });
  btn.disabled=false;
  if(!error){ lastChatSent=txt; input.value=''; input.focus(); }
  else { alert("Message non envoyé, réessaie."); }
}

function teardownChat(){
  if(chatChannel){ try{ sb.removeChannel(chatChannel); }catch(e){} chatChannel=null; }
  ['chatFab','chatPanel'].forEach(id=>{ const el=document.getElementById(id); if(el) el.remove(); });
  chatInited=false; chatOpen=false; chatUnread=0; chatSeenIds=new Set();
  chatLastMsgId=0; chatMembers=[]; chatReads={}; chatTotalMembers=0;
}

// ====== DÉMARRAGE ======
async function boot(){
  if(!sb) return;
  checkAlreadyInstalled(); // masque la bannière si l'appli est déjà installée
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ renderHome(session); }
  else { renderAuth(); }
  hideSplash();
}
boot();
</script>
